{% extends "base.html" %}

{% block title %}Настройки страницы {{ page.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Настройки страницы</h1>
            <p class="text-muted mb-0">Редактирование страницы <code>{{ page.slug }}</code>.</p>
        </div>
        <a href="{{ url_for('admin_site_page_content', page_slug=page.slug) }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> К блокам
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form method="POST" class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Название страницы</label>
                    <input type="text" name="name" class="form-control" value="{{ page.name }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Порядок</label>
                    <input type="number" name="sort_order" class="form-control" value="{{ page.sort_order }}">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="is_enabled" name="is_enabled" {% if page.is_enabled %}checked{% endif %}>
                        <label class="form-check-label" for="is_enabled">Страница включена</label>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">Meta title</label>
                    <input type="text" name="meta_title" class="form-control" value="{{ page.meta_title or '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label">Meta description</label>
                    <textarea name="meta_description" rows="4" class="form-control">{{ page.meta_description or '' }}</textarea>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Сохранить
                    </button>
                    <a href="{{ url_for('admin_site_page_content', page_slug=page.slug) }}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
